<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Dad Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;color:#fff;font-family:Inter,sans-serif;min-height:100vh;padding-bottom:40px;}
.hdr{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.06);}
.hdr-title{font-family:"Barlow Condensed",sans-serif;font-size:28px;font-weight:900;letter-spacing:1px;color:#fff;}
.hdr-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px;letter-spacing:0.5px;}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-end;}
.refresh-info{font-size:11px;color:rgba(255,255,255,0.3);}
.refresh-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:Inter,sans-serif;transition:all 0.2s;}
.refresh-btn:hover{background:rgba(255,255,255,0.14);color:#fff;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding:20px;}
.card{background:#12121c;border-radius:16px;border:1px solid rgba(255,255,255,0.07);overflow:hidden;transition:transform 0.2s;}
.card:hover{transform:translateY(-2px);}
.card-top{padding:16px 18px 12px;}
.kid-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.kid-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:"Barlow Condensed",sans-serif;font-weight:900;font-size:20px;color:#fff;flex-shrink:0;}
.kid-name{font-family:"Barlow Condensed",sans-serif;font-size:24px;font-weight:800;line-height:1;}
.kid-sport{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.5px;margin-top:2px;}
.kid-weight{font-size:11px;margin-top:2px;font-weight:500;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.stat{background:#1a1a28;border-radius:10px;padding:11px 13px;}
.stat-label{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.stat-val{font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:800;line-height:1;}
.stat-unit{font-size:11px;color:rgba(255,255,255,0.4);font-family:Inter,sans-serif;font-weight:400;}
.water-bar-wrap{background:#1a1a28;border-radius:10px;padding:11px 13px;margin-bottom:8px;}
.water-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.water-label{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase;}
.water-count{font-family:"Barlow Condensed",sans-serif;font-size:16px;font-weight:700;}
.water-track{background:#0d0d1a;border-radius:6px;height:10px;overflow:hidden;}
.water-fill{height:100%;border-radius:6px;transition:width 0.6s ease;}
.last-workout{background:#1a1a28;border-radius:10px;padding:11px 13px;margin-bottom:8px;}
.lw-label{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.lw-name{font-family:"Barlow Condensed",sans-serif;font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lw-meta{font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px;}
.week-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.06);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:500;color:rgba(255,255,255,0.55);}
.week-num{font-family:"Barlow Condensed",sans-serif;font-size:18px;font-weight:800;color:#fff;}
.macros-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;}
.macro{background:#1a1a28;border-radius:10px;padding:9px 10px;text-align:center;}
.macro-val{font-family:"Barlow Condensed",sans-serif;font-size:18px;font-weight:800;}
.macro-label{font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.sync-row{padding:8px 18px 14px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,0.05);}
.sync-time{font-size:10px;color:rgba(255,255,255,0.25);}
.no-data{text-align:center;padding:30px 20px;color:rgba(255,255,255,0.3);}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-banner{background:#2d1212;border:1px solid #7f1d1d;color:#fca5a5;border-radius:10px;padding:12px 16px;margin:16px 20px;font-size:13px;}
.tag-offline{font-size:10px;color:#f87171;background:rgba(248,113,113,0.12);border-radius:5px;padding:2px 7px;letter-spacing:0.5px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div>
      <div class="hdr-title">DAD DASHBOARD</div>
      <div class="hdr-sub" id="last-refresh">Loading...</div>
    </div>
    <button class="refresh-btn" onclick="loadAll()">REFRESH</button>
  </div>
</div>

<div id="error-area"></div>
<div id="content">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div style="font-size:13px;color:rgba(255,255,255,0.35)">Loading kids' data...</div>
  </div>
</div>

<script>
var FB = "https://jarvis-family-7e8c9-default-rtdb.firebaseio.com";
var KIDS = ["lincoln","camille","cicily","carter"];
var data = {};

function timeAgo(ts) {
  if (!ts) return "never";
  var diff = Date.now() - ts;
  var m = Math.floor(diff / 60000);
  if (m < 1) return "just now";
  if (m < 60) return m + "m ago";
  var h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  return Math.floor(h / 24) + "d ago";
}

function waterColor(pct, acc) {
  if (pct >= 100) return "#22c55e";
  if (pct >= 60) return acc;
  if (pct >= 30) return "#f59e0b";
  return "#ef4444";
}

function cardHTML(kid, d) {
  if (!d) return '<div class="card"><div class="card-top"><div class="kid-row"><div class="kid-avatar" style="background:#222">?</div><div><div class="kid-name" style="color:#666">' + kid.toUpperCase() + '</div><div class="kid-sport">No data yet</div></div></div></div></div>';

  var acc = d.acc || "#888";
  var initials = d.name ? d.name[0].toUpperCase() : kid[0].toUpperCase();
  var waterPct = d.waterGoal ? Math.min(100, Math.round((d.waterToday || 0) / d.waterGoal * 100)) : 0;
  var wColor = waterColor(waterPct, acc);
  var isOnline = d.lastSync && (Date.now() - d.lastSync) < 3600000;

  var weightLine = d.weight ? '<div class="kid-weight" style="color:' + acc + '">' + d.weight + ' lbs</div>' : '';
  var syncBadge = isOnline ? '<span class="live-dot"></span>' : '<span class="tag-offline">OFFLINE</span>';

  var lastWo = d.lastWorkout
    ? '<div class="lw-name">' + d.lastWorkout.ex + '</div><div class="lw-meta">' + (d.lastWorkout.date || "") + (d.lastWorkout.time ? " &bull; " + d.lastWorkout.time : "") + '</div>'
    : '<div class="lw-name" style="color:rgba(255,255,255,0.25)">No workouts logged</div>';

  var macros = (d.calories && d.protein && d.carbs && d.fat)
    ? '<div class="macros-row"><div class="macro"><div class="macro-val" style="color:' + acc + '">' + d.protein + '</div><div class="macro-label">Protein</div></div><div class="macro"><div class="macro-val" style="color:' + acc + '">' + d.carbs + '</div><div class="macro-label">Carbs</div></div><div class="macro"><div class="macro-val" style="color:' + acc + '">' + d.fat + '</div><div class="macro-label">Fat</div></div></div>'
    : '<div style="background:#1a1a28;border-radius:10px;padding:11px 13px;margin-bottom:8px;font-size:12px;color:rgba(255,255,255,0.25)">Enter bodyweight in app for macro targets</div>';

  return '<div class="card">' +
    '<div class="card-top">' +
      '<div class="kid-row">' +
        '<div class="kid-avatar" style="background:' + acc + '22;border:2px solid ' + acc + '44">' +
          '<span style="color:' + acc + '">' + initials + '</span>' +
        '</div>' +
        '<div style="flex:1">' +
          '<div class="kid-name" style="color:' + acc + '">' + (d.name || kid).toUpperCase() + '</div>' +
          '<div class="kid-sport">' + (d.sport || "") + '</div>' +
          weightLine +
        '</div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">' +
          syncBadge +
          '<div class="week-badge"><span class="week-num" style="color:' + acc + '">' + (d.weeklyCount || 0) + '</span> this wk</div>' +
        '</div>' +
      '</div>' +

      '<div class="stat-row">' +
        '<div class="stat"><div class="stat-label">Calories</div><div class="stat-val" style="color:' + acc + '">' + (d.calories || "—") + '<span class="stat-unit"> kcal</span></div></div>' +
        '<div class="stat"><div class="stat-label">Water Today</div><div class="stat-val" style="color:' + wColor + '">' + (d.waterToday || 0) + '<span class="stat-unit"> / ' + (d.waterGoal || "—") + ' cups</span></div></div>' +
      '</div>' +

      '<div class="water-bar-wrap">' +
        '<div class="water-label-row"><span class="water-label">Hydration</span><span class="water-count" style="color:' + wColor + '">' + waterPct + '%</span></div>' +
        '<div class="water-track"><div class="water-fill" style="width:' + waterPct + '%;background:' + wColor + '"></div></div>' +
      '</div>' +

      '<div class="last-workout"><div class="lw-label">Last Workout</div>' + lastWo + '</div>' +

      macros +

    '</div>' +
    '<div class="sync-row">' +
      '<span class="sync-time">Last sync: ' + timeAgo(d.lastSync) + '</span>' +
    '</div>' +
  '</div>';
}

async function loadAll() {
  document.getElementById("error-area").innerHTML = "";
  try {
    var resp = await fetch(FB + "/athletes.json");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    var all = await resp.json();
    data = all || {};
    renderCards();
    var now = new Date();
    document.getElementById("last-refresh").textContent =
      "Updated " + now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}) + " — auto-refreshes every 30s";
  } catch(e) {
    document.getElementById("error-area").innerHTML =
      '<div class="error-banner">Could not reach Firebase: ' + e.message + '. Check your internet connection.</div>';
    if (!Object.keys(data).length) {
      document.getElementById("content").innerHTML =
        '<div class="loading-screen"><div style="font-size:13px;color:rgba(255,255,255,0.35)">Waiting for data...</div></div>';
    }
  }
}

function renderCards() {
  var html = '<div class="grid">';
  KIDS.forEach(function(kid) {
    html += cardHTML(kid, data[kid] || null);
  });
  html += "</div>";
  document.getElementById("content").innerHTML = html;
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
